[flake8]
extend-ignore = E203, E501,
max-line-length = 120
per-file-ignores =
    examples/*.py:E402
    examples/eval_ppo_example.py:E402,W292
exclude =
    .git,
    .eggs,
    .mypy_cache,
    .nox,
    .pytest_cache,
    .tox,
    .venv,
    __pycache__,
    build,
    dist,
    docs/_build,
    site-packages,
    wandb
