[flake8]
extend-ignore = E203, E501,
max-line-length = 120
per-file-ignores =
    examples/*.py:E402
    examples/eval_ppo_example.py:E402,W292
    f1tenth_gym_jax/envs/rendering/__init__.py:F401
    f1tenth_gym_jax/envs/track/__init__.py:F401
exclude =
    .git,
    __pycache__,
    build,
    dist
