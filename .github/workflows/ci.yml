name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    env:
      JAX_PLATFORMS: cpu
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: uv sync --frozen --dev --extra examples --extra rl

      - name: Test
        run: uv run pytest

  docs:
    runs-on: ubuntu-latest
    env:
      JAX_PLATFORMS: cpu
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: uv sync --frozen --dev --extra docs

      - name: Build docs
        run: uv run sphinx-build -W -b html docs /tmp/f1tenth_gym_jax_docs_build

  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Build package
        run: uv build --out-dir dist

      - name: Check packaged maps
        run: |
          python - <<'PY'
          import tarfile
          import zipfile
          from pathlib import Path

          sdist = next(Path("dist").glob("*.tar.gz"))
          wheel = next(Path("dist").glob("*.whl"))
          required = {
              "maps/Spielberg/Spielberg.yaml",
              "maps/Spielberg/Spielberg.png",
              "maps/Spielberg/Spielberg_centerline.csv",
              "maps/Spielberg/Spielberg_raceline.csv",
          }

          with tarfile.open(sdist) as archive:
              sdist_names = set(archive.getnames())
          missing_sdist = [
              path for path in required
              if not any(name.endswith(path) for name in sdist_names)
          ]
          if missing_sdist:
              raise SystemExit(f"sdist is missing map files: {missing_sdist}")

          with zipfile.ZipFile(wheel) as archive:
              wheel_names = set(archive.namelist())
          missing_wheel = sorted(required - wheel_names)
          if missing_wheel:
              raise SystemExit(f"wheel is missing map files: {missing_wheel}")
          PY

  examples:
    runs-on: ubuntu-latest
    env:
      JAX_PLATFORMS: cpu
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: uv sync --frozen --dev --extra examples --extra rl

      - name: Import Python examples
        run: |
          uv run python - <<'PY'
          import importlib.util
          import sys
          from pathlib import Path

          sys.path.insert(0, str(Path("examples").resolve()))
          for path in sorted(Path("examples").glob("*.py")):
              spec = importlib.util.spec_from_file_location(path.stem, path)
              module = importlib.util.module_from_spec(spec)
              spec.loader.exec_module(module)
              print(path)
          PY

      - name: Run lightweight example smoke tests
        run: |
          uv run python examples/run_in_empty_track.py --steps 2 --no-render
          uv run python examples/waypoint_follow.py --num-agents 1 --num-envs 1 --steps 2 --no-render
          uv run python examples/mppi_example.py --num-agents 1 --num-envs 1 --steps 1 --num-samples 2 --horizon 2 --no-plots --no-render
          uv run python examples/video_recording.py --steps 1 --output /tmp/f1tenth_gym_jax_rollout.gif
