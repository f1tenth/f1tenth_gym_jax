name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      JAX_PLATFORMS: cpu

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Check formatting
        run: |
          uv run black --check f1tenth_gym_jax tests examples docs/conf.py
          uv run isort --check-only f1tenth_gym_jax tests examples docs/conf.py

      - name: Lint
        run: uv run flake8 f1tenth_gym_jax tests examples docs/conf.py
